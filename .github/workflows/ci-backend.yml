name: CI de Validação - Backend Python

on:
  pull_request:
    branches: ["main"]

jobs:
  validar_python:
    name: Checagem de Sintaxe e Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Substitua se estiver usando outra versão

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar Sintaxe (Dry Run)
        # Tenta compilar o arquivo. Se tiver erro de indentação ou variável solta, ele bloqueia!
        run: python -m py_compile main.py
